<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>写真地図ビューワ</title>
<style>
  :root{ --maxWidth:1100px; }
  body{ font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN","メイリオ",sans-serif; margin:12px; background:#f6f7fb; color:#222; }
  header{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  button,input{ font-size:14px; }
  #mapContainer{ position:relative; width:100%; max-width:var(--maxWidth); border:1px solid #ddd; background:#eee; overflow:hidden; }
  #mapImage{ display:block; width:100%; height:auto; user-select:none; -webkit-user-drag:none; }
  .marker{ position:absolute; transform:translate(-50%,-100%); width:34px;height:34px;border-radius:50%;
           background:linear-gradient(#fff,#f0f0f0); border:1px solid #444; display:flex;align-items:center;justify-content:center;
           font-weight:700; box-shadow:0 4px 10px rgba(0,0,0,0.12); cursor:pointer; z-index:40; }
  .panel{ position:absolute; z-index:80; left:12px; top:12px; background:rgba(255,255,255,0.96); padding:10px; border-radius:8px; border:1px solid #ddd; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
  .dirButtons{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .dirButtons button{ padding:6px 8px; }
  .thumbOverlay{ position:absolute; transform:translate(-50%,-50%); display:flex; gap:8px; flex-direction:column; align-items:center; z-index:70; pointer-events:auto; }
  .thumbBox{ background:#fff; border:1px solid #ccc; padding:6px; border-radius:6px; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.12); }
  .thumbBox img{ display:block; width:160px; max-width:22vw; height:auto; border-radius:4px; }
  .thumbLabel{ font-size:13px; color:#222; margin-top:6px; text-align:center;}
  .modal{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.65); z-index:9999;}
  .modal.open{ display:flex; }
  .modalContent{ background:#fff; padding:12px; border-radius:8px; max-width:95%; max-height:95%; overflow:auto; }
  .modalContent img{ max-width:100%; height:auto; display:block; margin-bottom:8px; }
  footer{ margin-top:10px; font-size:13px; color:#555; }
  small.note{ color:#666; display:block; margin-top:6px; }
</style>
</head>
<body>
<header>
  <label>写真フォルダ選択: <input id="photos" type="file" webkitdirectory directory multiple></label>
  <button id="resetBtn">読み込みクリア</button>
  <button id="toggleEdit">編集モード（オフ）</button>
  <button id="downloadPos">位置ダウンロード(JSON)</button>
</header>

<div id="mapContainer" style="max-width:var(--maxWidth);">
  <img id="mapImage" src="map.png" alt="map" />
</div>
<!-- 情報パネル -->
<div id="infoPanel" class="panel" style="display:none;">
  <div style="font-weight:700">地点: <span id="infoAA"></span></div>
  <div class="dirButtons" id="dirButtons"></div>
  <div style="margin-top:8px;">
    <button id="centerMarker">中央化</button>
    <button id="closePanel">閉じる</button>
  </div>
</div>

<!-- モーダル -->
<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="modalContent">
    <button id="closeModal" style="float:right;">閉じる</button>
    <div id="modalInner"></div>
  </div>
</div>

<footer>
  <div>ファイル名規則: <code>YYYYMMDD_AA-X(-BB).jpg</code>（例: <code>19780415_03-NE-01.jpg</code>）</div>
  <small class="note">注: ブラウザのセキュリティでローカルファイルは「ページを閉じるまで」保持されます。公開時は画像をサーバ（または CDN）に置く必要があります。</small>
</footer>

<script>
/* 設定 */
const regex = /^(\d{4})(\d{2})(\d{2})_(\d{2})-([NESW]{1,2})(?:-(\d{2}))?\.jpe?g$/i;
const directions = ["N","NE","E","SE","S","SW","W","NW"];

const mapFileInput = document.getElementById('mapFile');
const photosInput = document.getElementById('photos');
const mapImage = document.getElementById('mapImage');
const mapContainer = document.getElementById('mapContainer');
const infoPanel = document.getElementById('infoPanel');
const infoAA = document.getElementById('infoAA');
const dirButtons = document.getElementById('dirButtons');
const resetBtn = document.getElementById('resetBtn');
const toggleEditBtn = document.getElementById('toggleEdit');
const downloadPosBtn = document.getElementById('downloadPos');
const centerMarkerBtn = document.getElementById('centerMarker');
const closePanelBtn = document.getElementById('closePanel');

const modal = document.getElementById('modal');
const modalInner = document.getElementById('modalInner');
const closeModal = document.getElementById('closeModal');

let positions = {};         // { "01": {xPct:.., yPct:..}, ... }  ← positions.json からロード
let imagesByAA = {};       // imagesByAA[AA][DIR] = [ {name,url,date,dateShort,seq} ]
let markers = {};          // DOM markers
let editing = false;
let currentAA = null;
let currentThumbOverlay = null;

/* 起動時: positions.json を自動読み込み（存在すれば） */
fetch('positions.json').then(r=>{
  if(!r.ok) throw new Error('no positions.json');
  return r.json();
}).then(data=>{
  positions = data;
  renderAllMarkers();
  console.log('positions.json loaded');
}).catch(err=>{
  console.log('positions.json not found or load failed:', err.message);
});

/* 地図画像 */
mapFileInput.addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  mapImage.src = URL.createObjectURL(f);
  mapImage.onload = ()=> renderAllMarkers();
});

/* 写真フォルダ（フォルダ丸ごと読み込み） */
photosInput.addEventListener('change', e=>{
  const files = Array.from(e.target.files);
  imagesByAA = {};
  for(const f of files){
    const m = f.name.match(regex);
    if(!m) continue;
    const [_, YYYY, MM, DD, AA, DIR, SEQ] = m;
    const ymd = `${YYYY}${MM}${DD}`;
    const dateShort = `${YYYY.slice(-2)}${MM}${DD}`; // YYMMDD
    const entry = { name: f.name, url: URL.createObjectURL(f), date: ymd, dateShort, seq: SEQ || null };
    imagesByAA[AA] = imagesByAA[AA] || {};
    imagesByAA[AA][DIR] = imagesByAA[AA][DIR] || [];
    imagesByAA[AA][DIR].push(entry);
  }
  // マーカーがない AA を positions に補完（仮位置：50%±バラつき）
  for(const aa of Object.keys(imagesByAA)){
    if(!positions[aa]) positions[aa] = { xPct: 50 + (Math.random()-0.5)*20, yPct: 50 + (Math.random()-0.5)*20 };
  }
  renderAllMarkers();
  alert('写真の取り込み完了。マーカーをクリックして方向を選んでください（必要なら編集モードで位置調整）。');
});

/* マーカー描画 */
function renderAllMarkers(){
  // 既存を削除
  Object.values(markers).forEach(el=>el.remove());
  markers = {};
  // mapImage のサイズが決まっていないときは中央に仮置き（CSS%指定でOK）
  for(const aa of Object.keys(positions)){
    const pos = positions[aa];
    const el = document.createElement('div');
    el.className = 'marker';
    el.textContent = aa;
    el.style.left = (pos.xPct)+'%';
    el.style.top = (pos.yPct)+'%';
    el.dataset.aa = aa;
    el.addEventListener('click', e=>{ e.stopPropagation(); openInfoPanel(aa, el); });
    // 編集時のドラッグ
    el.addEventListener('pointerdown', ev=>{
      if(!editing) return;
      ev.preventDefault();
      const marker = ev.currentTarget;
      marker.setPointerCapture(ev.pointerId);
      const onMove = e=>{
        const rect = mapContainer.getBoundingClientRect();
        const xPct = ((e.clientX - rect.left) / rect.width) * 100;
        const yPct = ((e.clientY - rect.top) / rect.height) * 100;
        marker.style.left = xPct + '%';
        marker.style.top = yPct + '%';
      };
      const onUp = e=>{
        marker.releasePointerCapture(ev.pointerId);
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        // 保存
        const finalX = parseFloat(marker.style.left);
        const finalY = parseFloat(marker.style.top);
        positions[marker.dataset.aa] = { xPct: finalX, yPct: finalY };
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
    mapContainer.appendChild(el);
    markers[aa] = el;
  }
  hideInfoPanel();
  applyEditingVisual();
}

/* 情報パネル（方向ボタン作成） */
function openInfoPanel(aa, markerEl){
  currentAA = aa;
  infoAA.textContent = aa;
  infoPanel.style.display = 'block';
  // パネル位置をマーカー近傍へ（簡易）
  const rectMap = mapContainer.getBoundingClientRect();
  const rectMark = markerEl.getBoundingClientRect();
  infoPanel.style.left = (rectMark.left - rectMap.left + 12) + 'px';
  infoPanel.style.top = Math.max(6, rectMark.top - rectMap.top - 90) + 'px';
  dirButtons.innerHTML = '';
  for(const d of directions){
    const btn = document.createElement('button');
    btn.textContent = d;
    btn.disabled = !(imagesByAA[aa] && imagesByAA[aa][d] && imagesByAA[aa][d].length);
    btn.addEventListener('click', ()=> showThumbnailsAtMarker(aa, d, markerEl));
    dirButtons.appendChild(btn);
  }
}

/* サムネイル重ね表示（遅延読み込み: loading="lazy"） */
function showThumbnailsAtMarker(aa, dir, markerEl){
  removeThumbOverlay();
  const list = (imagesByAA[aa] && imagesByAA[aa][dir]) || [];
  if(list.length === 0){ alert('該当する写真がありません'); return; }
  // オーバーレイ作成
  const overlay = document.createElement('div');
  overlay.className = 'thumbOverlay';
  overlay.style.left = markerEl.style.left;
  overlay.style.top = markerEl.style.top;
  // 新しい順に（date降順）
  const sorted = list.slice().sort((a,b)=> b.date.localeCompare(a.date));
  for(const item of sorted){
    const box = document.createElement('div');
    box.className = 'thumbBox';
    const img = document.createElement('img');
    img.src = item.url;
    img.loading = 'lazy';
    img.alt = item.name;
    const lbl = document.createElement('div');
    lbl.className = 'thumbLabel';
    lbl.textContent = `${item.dateShort}${item.seq? ' ('+item.seq+')':''}`;
    box.appendChild(img);
    box.appendChild(lbl);
    box.addEventListener('click', ()=> openModalWithImage(item, aa, dir));
    overlay.appendChild(box);
  }
  mapContainer.appendChild(overlay);
  currentThumbOverlay = overlay;
}

/* サムネイル削除 */
function removeThumbOverlay(){
  if(currentThumbOverlay){ currentThumbOverlay.remove(); currentThumbOverlay = null; }
}

/* モーダル表示 */
function openModalWithImage(item, aa, dir){
  modalInner.innerHTML = '';
  const img = document.createElement('img');
  img.src = item.url;
  const meta = document.createElement('div');
  meta.textContent = `撮影日: ${item.dateShort}  地点: ${aa}  方向: ${dir}  ファイル: ${item.name}`;
  const dl = document.createElement('a');
  dl.href = item.url;
  dl.download = item.name;
  dl.textContent = '画像ダウンロード';
  dl.style.display = 'inline-block';
  dl.style.marginTop = '8px';
  modalInner.appendChild(img);
  modalInner.appendChild(meta);
  modalInner.appendChild(dl);
  modal.classList.add('open');
}

/* モーダル閉じる */
closeModal.addEventListener('click', ()=> modal.classList.remove('open'));
modal.addEventListener('click', e=> { if(e.target === modal) modal.classList.remove('open'); });

/* パネル閉じる */
closePanelBtn.addEventListener('click', ()=> { hideInfoPanel(); });
function hideInfoPanel(){ infoPanel.style.display = 'none'; removeThumbOverlay(); currentAA = null; }

/* 編集モード切替 */
toggleEditBtn.addEventListener('click', ()=>{
  editing = !editing;
  toggleEditBtn.textContent = editing ? '編集モード（オン）' : '編集モード（オフ）';
  applyEditingVisual();
});
function applyEditingVisual(){
  Object.values(markers).forEach(el=>{
    el.style.outline = editing ? '2px dashed orange' : 'none';
    el.style.cursor = editing ? 'move' : 'pointer';
  });
}

/* マップをクリックして currentAA の位置を更新（編集モード中） */
mapContainer.addEventListener('click', e=>{
  if(!editing) return;
  if(!currentAA){
    const aa = prompt('登録する地点番号 AA（2桁）を入力してください（例: 03）');
    if(!aa) return;
    const rect = mapContainer.getBoundingClientRect();
    positions[aa] = { xPct: ((e.clientX-rect.left)/rect.width)*100, yPct: ((e.clientY-rect.top)/rect.height)*100 };
    renderAllMarkers();
    return;
  }
  const rect = mapContainer.getBoundingClientRect();
  positions[currentAA] = { xPct: ((e.clientX-rect.left)/rect.width)*100, yPct: ((e.clientY-rect.top)/rect.height)*100 };
  renderAllMarkers();
});

/* 中央化（パネル） */
centerMarkerBtn.addEventListener('click', ()=>{
  if(!currentAA) return;
  positions[currentAA] = { xPct:50, yPct:50 };
  renderAllMarkers();
});

/* 位置JSONダウンロード */
downloadPosBtn.addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(positions, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'positions.json';
  a.click();
  URL.revokeObjectURL(url);
});

/* リセット */
resetBtn.addEventListener('click', ()=>{
  if(!confirm('写真と位置情報をクリアしますか？（ページをリロードするとローカルの File オブジェクトは失われます）')) return;
  imagesByAA = {};
  positions = {};
  Object.values(markers).forEach(m=>m.remove());
  markers = {};
  removeThumbOverlay();
  hideInfoPanel();
});

/* ページ読み込み時に mapImage の onload を監視してマーカーを再描画 */
mapImage.addEventListener('load', ()=> renderAllMarkers());

</script>
</body>
</html>
