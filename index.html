<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Map Site</title>
    <style>
        /* CSSで基本的なスタイルを設定 */
        #map-container {
            position: relative;
            display: inline-block; /* 地図のサイズに合わせる */
        }
        #map-image {
            display: block;
            width: 1024px; /* map.pngの幅 */
            height: 535px; /* map.pngの高さ */
        }
        .marker {
            position: absolute;
            background-color: red;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -50%); /* 中央寄せ */
            z-index: 10;
        }

        /* 方向選択ダイアログとサムネイル表示エリア */
        #dialog-container {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            display: none; /* 初期状態では非表示 */
        }
        .direction-button {
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
        }
        #thumbnails-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .thumbnail-item {
            cursor: pointer;
            border: 1px solid #ddd;
            padding: 5px;
            text-align: center;
        }
        .thumbnail-item img {
            width: 150px; /* サムネイルのサイズ */
            height: auto;
            display: block;
        }
        .thumbnail-item span {
            font-size: 0.8em;
            display: block;
        }

        /* モーダル表示用スタイル */
        .modal {
            display: none; /* 初期状態では非表示 */
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 1400px;
            background-color: #fefefe;
            display: flex;
            gap: 20px;
        }
        .modal-photo, .modal-map {
            flex: 1;-
            text-align: center;
        }
        .modal-photo img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
        }
        .modal-map-container {
            position: relative;
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
        }
        .modal-map-container img {
            width: 100%;
            height: auto;
        }
        .modal-marker {
            position: absolute;
            background-color: blue; /* モーダル用のマーカーの色を変える */
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            text-align: center;
            line-height: 25px;
            font-size: 14px;
            cursor: pointer;
            border: 3px solid yellow;
            transform: translate(-50%, -50%);
            z-index: 110;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>小田急線鶴川駅の1974-1979年の写真</h1>

    <div id="map-container">
        <img id="map-image" src="map.png" alt="地図">
        </div>

    <div id="dialog-container">
        <h2>地点 <span id="current-aa"></span> の写真選択</h2>
        <div id="direction-buttons">
            </div>
        <div id="thumbnails-container">
            </div>
    </div>

    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-photo">
                <h3>写真 (<span id="modal-photo-filename"></span>)</h3>
                <img id="modal-photo-img" src="" alt="写真">
            </div>
            <div class="modal-map">
                <h3>撮影位置</h3>
                <div class="modal-map-container">
                    <img id="modal-map-img" src="map.png" alt="地図">
                    <div id="modal-map-marker" class="modal-marker"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScriptコード
        const MAP_WIDTH = 1024;
        const MAP_HEIGHT = 535;
        const DIRECTIONS = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];

        let positions = {};
        let photoFiles = [];
        let photosByLocationAndDirection = {}; // {AA: {X: [file1, file2, ...]}} の構造

        /**
         * 必要なJSONデータをすべて読み込む
         */
        async function loadData() {
            try {
                // positions.jsonの読み込み
                const posResponse = await fetch('positions.json');
                positions = await posResponse.json();

                // photos.jsonの読み込み
                const photoResponse = await fetch('photos.json');
                photoFiles = await photoResponse.json();

                // データを処理
                processPhotoFiles(photoFiles);

                // マーカーを表示
                renderMarkers();
            } catch (error) {
                console.error("データの読み込み中にエラーが発生しました:", error);
            }
        }

        /**
         * 写真ファイル名を解析し、地点(AA)と方向(X)で構造化
         * ファイル名: YYYYMMDD_AA-X(-BB).jpg
         */
        function processPhotoFiles(files) {
            const regex = /^(\d{8})_(\d{2})-([NESW]{1,2})(?:-(\d{2}))?\.jpg$/;
            photosByLocationAndDirection = {};

            files.forEach(filename => {
                const match = filename.match(regex);
                if (match) {
                    const [_, yyyymmdd, aa, x, bb] = match;
                    
                    if (!photosByLocationAndDirection[aa]) {
                        photosByLocationAndDirection[aa] = {};
                    }
                    if (!photosByLocationAndDirection[aa][x]) {
                        photosByLocationAndDirection[aa][x] = [];
                    }
                    
                    photosByLocationAndDirection[aa][x].push({
                        filename: filename,
                        yyyymmdd: yyyymmdd,
                        aa: aa,
                        x: x,
                        bb: bb // シーケンシャル番号
                    });
                }
            });

            // YYYYMMDDでソート
            for (const aa in photosByLocationAndDirection) {
                for (const x in photosByLocationAndDirection[aa]) {
                    photosByLocationAndDirection[aa][x].sort((a, b) => a.yyyymmdd.localeCompare(b.yyyymmdd));
                }
            }
        }

        /**
         * 地図上に撮影地点マーカー(AA)を表示
         */
        function renderMarkers() {
            const mapContainer = document.getElementById('map-container');
            
            for (const aa in positions) {
                const pos = positions[aa];
                
                const marker = document.createElement('div');
                marker.classList.add('marker');
                marker.textContent = aa;
                marker.style.left = `${pos.xPct * MAP_WIDTH / 100}px`;
                marker.style.top = `${pos.yPct * MAP_HEIGHT / 100}px`;
                marker.dataset.aa = aa;
                
                marker.addEventListener('click', () => showDirectionDialog(aa));
                
                mapContainer.appendChild(marker);
            }
        }

        /**
         * 地点(AA)に所属する方向(X)の選択ダイアログを表示
         */
        function showDirectionDialog(aa) {
            const dialogContainer = document.getElementById('dialog-container');
            const currentAASpan = document.getElementById('current-aa');
            const directionButtonsDiv = document.getElementById('direction-buttons');
            const thumbnailsContainer = document.getElementById('thumbnails-container');

            currentAASpan.textContent = aa;
            directionButtonsDiv.innerHTML = ''; // ボタンをクリア
            thumbnailsContainer.innerHTML = ''; // サムネイルをクリア
            
            const availableDirections = photosByLocationAndDirection[aa] ? Object.keys(photosByLocationAndDirection[aa]) : [];

            // 8方位の順でボタンを作成
            DIRECTIONS.forEach(direction => {
                if (availableDirections.includes(direction)) {
                    const button = document.createElement('button');
                    button.classList.add('direction-button');
                    button.textContent = direction;
                    button.dataset.aa = aa;
                    button.dataset.direction = direction;
                    button.addEventListener('click', () => showThumbnails(aa, direction));
                    directionButtonsDiv.appendChild(button);
                }
            });

            dialogContainer.style.display = 'block';
        }

        /**
         * 地点(AA)と方向(X)に対応する写真のサムネイルを表示
         */
        function showThumbnails(aa, x) {
            const thumbnailsContainer = document.getElementById('thumbnails-container');
            thumbnailsContainer.innerHTML = ''; // サムネイルをクリア

            const photos = photosByLocationAndDirection[aa] && photosByLocationAndDirection[aa][x] ? photosByLocationAndDirection[aa][x] : [];

            if (photos.length === 0) {
                thumbnailsContainer.textContent = "この方向には写真がありません。";
                return;
            }

            photos.forEach(photo => {
                const item = document.createElement('div');
                item.classList.add('thumbnail-item');
                item.dataset.filename = photo.filename;
                item.dataset.aa = photo.aa;
                
                // サムネイル画像（ここではファイルそのものを表示）
                const img = document.createElement('img');
                img.src = `photos/${photo.filename}`; // photosフォルダからのパス
                img.alt = photo.filename;

                // 撮影日
                const dateSpan = document.createElement('span');
                dateSpan.textContent = photo.yyyymmdd;
                
                item.appendChild(img);
                item.appendChild(dateSpan);
                
                item.addEventListener('click', () => showModal(photo.filename, photo.aa));
                
                thumbnailsContainer.appendChild(item);
            });
        }

        /**
         * モーダルウィンドウで写真と地図を表示
         */
        function showModal(filename, aa) {
            const modal = document.getElementById('photo-modal');
            const photoImg = document.getElementById('modal-photo-img');
            const filenameSpan = document.getElementById('modal-photo-filename');
            const mapMarker = document.getElementById('modal-map-marker');

            // 写真の表示
            photoImg.src = `photos/${filename}`;
            filenameSpan.textContent = filename;

            // 地図上のマーカー表示
            const pos = positions[aa];
            if (pos) {
                // modal-map-containerは幅が100%になるため、パーセントで計算
                mapMarker.style.left = `${pos.xPct}%`;
                mapMarker.style.top = `${pos.yPct}%`;
                mapMarker.textContent = aa;
                mapMarker.style.display = 'block';
                mapMarker.dataset.aa = aa;
            } else {
                mapMarker.style.display = 'none';
            }
            
            // 地図上のマーカーにクリックイベントを追加（再度方向選択ダイアログを開く機能）
            mapMarker.onclick = () => {
                closeModal();
                showDirectionDialog(aa);
                // 選択したサムネイルの位置までスクロール（任意）
                document.getElementById('dialog-container').scrollIntoView({ behavior: 'smooth' });
            };

            modal.style.display = 'block';
        }

        /**
         * モーダルウィンドウを閉じる
         */
        function closeModal() {
            document.getElementById('photo-modal').style.display = 'none';
        }

        // ページロード時にデータ読み込みを開始
        window.onload = loadData;

    </script>
</body>
</html>
