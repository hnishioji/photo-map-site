<title>小田急線鶴川駅（待避線が新設された1977年頃の風景）</title>
<style>
body {
  font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  margin:0; padding:0;
  background:#f7f7f7; color:#222;
}
header {
  background:#000080; color:#fff;
  padding:20px; text-align:center;
}
header h1 { margin:0; font-size:24px; }
header p { margin:8px 0 0; font-size:14px; color:#ddd; }
main {
  max-width:1100px; margin:20px auto; padding:0 10px;
}
#usage {
  background:#fff; border:1px solid #ddd;
  padding:10px 15px; margin-bottom:15px;
  border-radius:6px; font-size:14px;
}
#mapContainer { position:relative; }
#mapImage { width:100%; display:block; border:1px solid #aaa; }
.marker {
  position:absolute; transform:translate(-50%,-100%);
  width:32px; height:32px; border-radius:50%;
  background:#fff; border:2px solid #333;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
}
.thumbOverlay {
  position:absolute; background:#fff; border:1px solid #ccc;
  padding:6px; display:flex; flex-wrap:wrap; gap:8px;
  border-radius:6px; z-index:50;
}
.thumbBox { text-align:center; cursor:pointer; font-size:12px; }
.thumbBox img { max-width:120px; border:1px solid #999; display:block; }
.modal {
  position:fixed; inset:0; display:none;
  background:rgba(0,0,0,0.6);
  align-items:center; justify-content:center;
  z-index:9999;
}
.modal.open { display:flex; }
.modalInner {
  background:#fff; padding:15px; border-radius:8px;
  max-width:90%; max-height:90%; overflow:auto;
  text-align:center;
}
.modalInner img { max-width:100%; height:auto; }
#modalMeta { font-size:13px; color:#333; margin-top:8px; }
footer {
  text-align:center; font-size:12px; color:#666;
  padding:15px; margin-top:20px;
  border-top:1px solid #ccc;
}
</style>
</head>
<body>
<header>
  <h1>小田急線鶴川駅（待避線が新設された1977年頃の風景）</h1>
  <p>オリンパスPEN-EE(白黒ハーフサイズカメラ)による記録</p>
  <nav>
    <a href="about.html" style="color:#fff; margin-left:10px;">このHPについて</a>
    <a href="timeline.html" style="color:#fff; margin-left:10px;">小田急線鶴川駅待避線新設工事(1977年)関係年表</a>

  </nav>
</header>

<main>
  <section id="usage">
    <strong>使い方：</strong><br>
    1. 地図上の番号をクリックすると、その地点の写真一覧が表示されます。<br>
    2. サムネイルをクリックすると拡大写真が表示されます。<br>
    3. 写真のファイル名の"W""SE"などは、撮影の方向8方位(N,NE,E,SE,S,SW,W,NW)を表しています。<br>
    4. 拡大写真の画面では再び地図に戻ることができます。
  </section>

  <div id="mapContainer">
    <img id="mapImage" src="map.png" alt="map">
  </div>
</main>

<div id="modal" class="modal">
  <div class="modalInner">
    <button id="modalClose">閉じる</button><br>
    <img id="modalPhoto" src="" alt="">
    <div id="modalMeta"></div>
  </div>
</div>


<footer>
  © 2025 鶴川＠昭和 ｜ 無断転載禁止 ｜ <a href="https://x.com/residence_tsuru" target="_blank">X(Twitter)</a>
</footer>

<script>
const mapContainer = document.getElementById('mapContainer');
const modal = document.getElementById('modal');
const modalPhoto = document.getElementById('modalPhoto');
const modalMeta = document.getElementById('modalMeta');
const modalClose = document.getElementById('modalClose');

let positions = {};
let photos = [];

Promise.all([
  fetch('positions.json').then(r=>r.json()),
  fetch('photos.json').then(r=>r.json())
]).then(([pos, ph])=>{
  positions = pos;
  photos = ph;
  renderMarkers();
}).catch(err=>{
  alert("positions.json または photos.json の読み込みに失敗しました");
  console.error(err);
});

function renderMarkers(){
  Object.keys(positions).forEach(AA=>{
    const pos = positions[AA];
    const marker = document.createElement('div');
    marker.className = 'marker';
    marker.textContent = AA;
    marker.style.left = pos.xPct + "%";
    marker.style.top = pos.yPct + "%";
    marker.addEventListener('click', ()=>showThumbnails(AA, marker));
    mapContainer.appendChild(marker);
  });
}

function showThumbnails(AA, marker){
  const overlay = document.createElement('div');
  overlay.className = 'thumbOverlay';
  overlay.style.left = marker.style.left;
  overlay.style.top = marker.style.top;
  const list = photos.filter(p => p.file.includes("_" + AA + "-"));
  list.forEach(item=>{
    const box = document.createElement('div');
    box.className = 'thumbBox';
    const img = document.createElement('img');
    img.src = item.thumb;
    const lbl = document.createElement('div');
    lbl.textContent = item.file.slice(0,8); // YYYYMMDD
    box.appendChild(img);
    box.appendChild(lbl);
    box.addEventListener('click', ()=>openModal(item));
    overlay.appendChild(box);
  });
  document.querySelectorAll('.thumbOverlay').forEach(e=>e.remove());
  mapContainer.appendChild(overlay);
}

function openModal(item){
  modalPhoto.src = item.full;
  modalMeta.textContent = item.file;
  modal.classList.add('open');
}
modalClose.addEventListener('click', ()=>modal.classList.remove('open'));
</script>
</body>
</html>
