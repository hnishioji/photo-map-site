<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>写真地図ビューワ</title>
<style>
  body { font-family: sans-serif; margin: 10px; background:#f7f7f7; }
  #mapContainer { position: relative; max-width: 1024px; }
  #mapImage { width: 100%; display: block; }
  .marker {
    position: absolute; transform: translate(-50%, -100%);
    width: 30px; height: 30px; border-radius: 50%;
    background: white; border: 2px solid #333;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
  }
  .thumbOverlay { position: absolute; background: rgba(255,255,255,0.9);
    border:1px solid #ccc; padding:5px; display:flex; flex-wrap:wrap; gap:5px; }
  .thumbBox { text-align:center; cursor:pointer; }
  .thumbBox img { max-width:120px; border:1px solid #999; }
  .modal { position:fixed; inset:0; display:none; background:rgba(0,0,0,0.7);
    align-items:center; justify-content:center; z-index:9999; }
  .modal.open { display:flex; }
  .modalInner { background:#fff; padding:10px; border-radius:6px;
    max-width:90%; max-height:90%; overflow:auto; }
  .modalInner img { max-width:100%; height:auto; }
</style>
</head>
<body>
<h1>写真地図ビューワ</h1>

<div id="mapContainer">
  <img id="mapImage" src="map.png" alt="map">
</div>

<div id="modal" class="modal">
  <div class="modalInner">
    <button id="modalClose">閉じる</button><br>
    <img id="modalPhoto" src="" alt="">
    <div id="modalMeta"></div>
  </div>
</div>

<script>
const mapContainer = document.getElementById('mapContainer');
const mapImage = document.getElementById('mapImage');
const modal = document.getElementById('modal');
const modalPhoto = document.getElementById('modalPhoto');
const modalMeta = document.getElementById('modalMeta');
const modalClose = document.getElementById('modalClose');

let positions = {};
let photos = [];

// データ読み込み
Promise.all([
  fetch('positions.json').then(r=>r.json()),
  fetch('photos.json').then(r=>r.json())
]).then(([pos, ph])=>{
  positions = pos;
  photos = ph;
  renderMarkers();
}).catch(err=>{
  alert("positions.json または photos.json の読み込みに失敗しました");
  console.error(err);
});

function renderMarkers(){
  Object.keys(positions).forEach(AA=>{
    const pos = positions[AA];
    const marker = document.createElement('div');
    marker.className = 'marker';
    marker.textContent = AA;
    marker.style.left = pos.xPct + "%";
    marker.style.top = pos.yPct + "%";
    marker.addEventListener('click', ()=>showThumbnails(AA, marker));
    mapContainer.appendChild(marker);
  });
}

function showThumbnails(AA, marker){
  const overlay = document.createElement('div');
  overlay.className = 'thumbOverlay';
  overlay.style.left = marker.style.left;
  overlay.style.top = marker.style.top;
  const list = photos.filter(p => p.file.includes("_" + AA + "-"));
  list.forEach(item=>{
    const box = document.createElement('div');
    box.className = 'thumbBox';
    const img = document.createElement('img');
    img.src = item.thumb;
    const lbl = document.createElement('div');
    lbl.textContent = item.file.slice(0,8); // YYYYMMDD
    box.appendChild(img);
    box.appendChild(lbl);
    box.addEventListener('click', ()=>openModal(item));
    overlay.appendChild(box);
  });
  // 古いオーバーレイを削除
  document.querySelectorAll('.thumbOverlay').forEach(e=>e.remove());
  mapContainer.appendChild(overlay);
}

function openModal(item){
  modalPhoto.src = item.full;
  modalMeta.textContent = item.file;
  modal.classList.add('open');
}
modalClose.addEventListener('click', ()=>modal.classList.remove('open'));
</script>
</body>
</html>
