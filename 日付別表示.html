<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Photo Map</title>
<style>
  :root{--map-width:900px;--thumb-size:96px}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;margin:0;padding:0;background:#f6f6f6;color:#222}
  header{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:50}
  .navbtn{background:#0078d4;color:#fff;padding:8px 12px;border-radius:6px;text-decoration:none;font-weight:600}
  .navbtn:disabled, .navbtn[aria-disabled="true"]{opacity:.5;pointer-events:none}
  .title{font-size:18px;font-weight:700;margin-right:6px}
  .dateLabel{font-size:16px;color:#333;margin-left:auto}
  main{display:flex;flex-direction:column;align-items:center;padding:18px 12px 60px}
  .mapWrap{position:relative; width:100%; max-width:var(--map-width); background:#ddd}
  #mapImg{width:100%;height:auto;display:block}
  .thumbPin{position:absolute; width:var(--thumb-size); height:var(--thumb-size); transform:translate(-50%,-50%); box-shadow:0 6px 14px rgba(0,0,0,.18); border-radius:6px; overflow:hidden; border:3px solid rgba(255,255,255,.95); cursor:pointer; transition:transform .12s}
  .thumbPin img{width:100%;height:100%;object-fit:cover;display:block}
  .thumbPin:hover{transform:translate(-50%,-50%) scale(1.08)}
  .fileLabel{position:absolute;left:0;right:0;text-align:center;font-size:11px;color:#222;background:rgba(255,255,255,.9);padding:2px 6px;border-radius:4px;margin-top:6px}
  /* モーダル */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:200}
  .modal.is-open{display:flex}
  .modalContent{max-width:95vw;max-height:92vh;background:#111;padding:12px;border-radius:6px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .modalImg{max-width:calc(100vw - 160px);max-height:calc(80vh - 60px);display:block}
  .modalInfo{color:#fff;font-size:14px}
  .modalControls{display:flex;gap:8px}
  button.ctrl{background:#fff;border:0;padding:8px 10px;border-radius:6px;cursor:pointer;font-weight:600}
  /* レスポンシブで小さく */
  @media (max-width:640px){
    :root{--thumb-size:74px}
    header{padding:10px}
    .title{font-size:16px}
  }
</style>
</head>
<body>
<header>
  <div class="title">撮影日別地図上表示</div>
  <a id="prevBtn" class="navbtn" href="#" role="button">← 前の日付</a>
  <a id="indexBtn" class="navbtn" href="index.html" role="button">indexに戻る</a>
  <a id="nextBtn" class="navbtn" href="#" role="button">次の日付 →</a>
  <div class="dateLabel" id="dateLabel">読み込み中...</div>
</header>

<main>
  <div class="mapWrap" id="mapWrap" aria-live="polite">
    <img id="mapImg" src="map.png" alt="map" />
    <!-- サムネイル要素はここに動的追加 -->
  </div>
  <p style="max-width:900px;color:#444;margin-top:12px;text-align:center">
    位置をクリックするとサムネイルが開き、サムネイルをクリックすると大きな画像が表示されます。
  </p>
</main>

<!-- モーダル -->
<div id="modal" class="modal" role="dialog" aria-hidden="true">
  <div class="modalContent" role="document">
    <img id="modalImg" class="modalImg" src="" alt="">
    <div class="modalInfo" id="modalInfo"></div>
    <div class="modalControls">
      <button id="prevImg" class="ctrl">◀ 前</button>
      <button id="closeModal" class="ctrl">閉じる</button>
      <button id="nextImg" class="ctrl">次 ▶</button>
    </div>
  </div>
</div>

<script>
/*
 動作の要点:
 - photos.json を読み込んで日付ごとにグループ化
 - positions.json の xPct,yPct に合わせてサムネイルを mapWrap 内に配置
 - 最初に最小日付を選択して表示
 - 前/次ボタンで日付を移動
 - モーダルで同日内の画像を前後移動
*/

(async function(){
  const photosUrl = 'photos.json';
  const posUrl = 'positions.json';
  const mapWrap = document.getElementById('mapWrap');
  const dateLabel = document.getElementById('dateLabel');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const indexBtn = document.getElementById('indexBtn');

  // 取得
  let photos, positions;
  try {
    const [pRes, posRes] = await Promise.all([fetch(photosUrl), fetch(posUrl)]);
    photos = await pRes.json();
    positions = await posRes.json();
  } catch(err){
    dateLabel.textContent = 'JSONの読み込みに失敗しました: ' + err;
    console.error(err); return;
  }

  // 日付パース: photos.json の file 名から YYYYMMDD を取り出す
  // 形式: YYYYMMDD-AA-X(-BB).jpg  -> file フィールドにはフル名が入っている想定
  function extractDateFromFile(fname){
    // 先頭8文字が日付の想定
    const base = fname.split('/').pop();
    if(base.length >= 8 && /^\d{8}/.test(base)) return base.slice(0,8); 
    // 失敗時は空
    return '';
  }
  // 日付フォーマット YYYYMMDD -> YYYY-MM-DD 表示
  function prettyDate(yyyymmdd){
    if(yyyymmdd.length!==8) return yyyymmdd;
    return yyyymmdd.slice(0,4) + '-' + yyyymmdd.slice(4,6) + '-' + yyyymmdd.slice(6,8);
  }

  // グルーピング
  const photosByDate = {}; // yyyyMMdd -> array of items
  for(const it of photos){
    const fn = it.file || (it.full ? it.full.split('/').pop() : '');
    const d = extractDateFromFile(fn);
    if(!d) continue;
    if(!photosByDate[d]) photosByDate[d] = [];
    // 拡張で、地点コード AA を抜き出す (YYYYMMDD-AA...)
    const base = fn.split('/').pop();
    const m = base.match(/^\d{8}-([A-Za-z0-9]{2})/);
    const point = m ? m[1] : '';
    photosByDate[d].push({
      file: it.file || it.full,
      thumb: it.thumb || ('thumbs/' + base),
      full: it.full || ('photos/' + base),
      baseName: base,
      point: point
    });
  }

  // 日付一覧（昇順）
  const dates = Object.keys(photosByDate).sort();
  if(dates.length===0){
    dateLabel.textContent = '写真データが見つかりません';
    return;
  }

  // 初期日 = 最初（最古）
  let idx = 0;

  // 表示更新
  function renderDate(index){
    // clamp
    if(index < 0) index = 0;
    if(index >= dates.length) index = dates.length - 1;
    idx = index;
    const dateKey = dates[idx];
    dateLabel.textContent = prettyDate(dateKey) + ` （${photosByDate[dateKey].length}枚）`;

    // enable/disable prev/next
    prevBtn.setAttribute('aria-disabled', idx===0 ? 'true' : 'false');
    nextBtn.setAttribute('aria-disabled', idx===dates.length-1 ? 'true' : 'false');

    // clear previous thumbnails
    // remove all elements with class thumbPin
    const old = mapWrap.querySelectorAll('.thumbPin');
    old.forEach(n => n.remove());

    // for each photo on that date, plot near its position
    const list = photosByDate[dateKey];
    // prepare cluster counts per point to offset overlapping thumbs
    const counts = {};
    for(let i=0;i<list.length;i++){
      const it = list[i];
      const pt = it.point || '__no__';
      counts[pt] = (counts[pt] || 0) + 1;
    }
    // used offsets index
    const usedIndex = {};
    for(let i=0;i<list.length;i++){
      const it = list[i];
      const pt = it.point || '__no__';
      const pos = positions[pt];
      // base percent coords
      let xPct = pos ? pos.xPct : 50;
      let yPct = pos ? pos.yPct : 50;
      // compute offset when multiple at same point
      usedIndex[pt] = (usedIndex[pt] || 0) + 1;
      const order = usedIndex[pt] - 1; // 0...
      // offset pattern: circle around center (small radius)
      const radius = Math.min(6 + order*10, 40); // in pixels
      const angle = (order * 47) * Math.PI/180; // degrees
      // convert percent to pixels requires map image size; compute after image loaded (getBoundingClientRect)
      // create thumb element with data for later positioning
      const div = document.createElement('div');
      div.className = 'thumbPin';
      div.dataset.xPct = xPct;
      div.dataset.yPct = yPct;
      div.dataset.order = order;
      div.dataset.radius = radius;
      div.dataset.angle = angle;
      div.title = it.baseName;
      // inner img
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = it.thumb;
      img.alt = it.baseName;
      div.appendChild(img);
      // attach data for modal
      div.dataset.full = it.full;
      div.dataset.basename = it.baseName;
      div.dataset.index = i; // index within list
      // append then position
      mapWrap.appendChild(div);

      // click to open modal
      div.addEventListener('click', ()=> openModalFor(list, parseInt(div.dataset.index,10)));
    }

    // after appending, position them
    positionThumbs();
    // re-position on window resize
    // (debounce)
  }

  // position all thumbPin elements based on map image size + stored xPct/yPct + offsets
  function positionThumbs(){
    const imgEl = document.getElementById('mapImg');
    const rect = imgEl.getBoundingClientRect();
    const pins = mapWrap.querySelectorAll('.thumbPin');
    pins.forEach(pin => {
      const xPct = parseFloat(pin.dataset.xPct) || 50;
      const yPct = parseFloat(pin.dataset.yPct) || 50;
      const radius = parseFloat(pin.dataset.radius) || 0;
      const angle = parseFloat(pin.dataset.angle) || 0;
      // convert percent -> pixel
      const left = rect.left + (rect.width * xPct / 100);
      const top = rect.top + (rect.height * yPct / 100);
      // apply offset in pixels (radius at given angle)
      const dx = Math.round(Math.cos(angle) * radius);
      const dy = Math.round(Math.sin(angle) * radius);
      // but position relative to mapWrap container (not viewport)
      const wrapRect = mapWrap.getBoundingClientRect();
      const leftRel = (left - wrapRect.left) + dx;
      const topRel = (top - wrapRect.top) + dy;
      // set style (percent within container)
      pin.style.left = (leftRel) + 'px';
      pin.style.top = (topRel) + 'px';
    });
  }

  // debounce resize
  let resizeTimer = null;
  window.addEventListener('resize', ()=>{
    if(resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(()=>{ positionThumbs(); }, 120);
  });

  // prev/next click handlers
  prevBtn.addEventListener('click', (e)=>{ e.preventDefault(); if(idx>0) renderDate(idx-1); });
  nextBtn.addEventListener('click', (e)=>{ e.preventDefault(); if(idx<dates.length-1) renderDate(idx+1); });

  // modal implementation
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  const modalInfo = document.getElementById('modalInfo');
  const prevImgBtn = document.getElementById('prevImg');
  const nextImgBtn = document.getElementById('nextImg');
  const closeModalBtn = document.getElementById('closeModal');

  let currentList = []; // current day's list
  let currentIndex = 0;
  function openModalFor(list, index){
    currentList = list;
    currentIndex = index;
    showModalImage();
    modal.classList.add('is-open');
    modal.setAttribute('aria-hidden','false');
  }
  function closeModal(){
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden','true');
  }
  function showModalImage(){
    if(!currentList || currentList.length===0) return;
    const it = currentList[currentIndex];
    modalImg.src = it.full;
    modalImg.alt = it.baseName;
    modalInfo.textContent = it.baseName + '  (' + it.full + ')  [' + (currentIndex+1) + '/' + currentList.length + ']';
    // disable prev/next when at ends
    prevImgBtn.disabled = (currentIndex <= 0);
    nextImgBtn.disabled = (currentIndex >= currentList.length-1);
  }
  prevImgBtn.addEventListener('click', ()=>{ if(currentIndex>0){ currentIndex--; showModalImage(); }});
  nextImgBtn.addEventListener('click', ()=>{ if(currentIndex<currentList.length-1){ currentIndex++; showModalImage(); }});
  closeModalBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (ev)=>{ if(ev.target === modal) closeModal(); });
  document.addEventListener('keydown', (ev)=>{
    if(modal.classList.contains('is-open')){
      if(ev.key === 'ArrowLeft') { if(currentIndex>0){ currentIndex--; showModalImage(); } }
      if(ev.key === 'ArrowRight'){ if(currentIndex<currentList.length-1){ currentIndex++; showModalImage(); } }
      if(ev.key === 'Escape') closeModal();
    }
  });

  // initial render
  renderDate(0);

})();
</script>
</body>
</html>
