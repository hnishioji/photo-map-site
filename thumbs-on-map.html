<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>撮影日別 地図上表示</title>
//鶴川駅　写真　昔　撮影日別　地図上表示
<style>
  body {
    font-family: sans-serif;
    margin: 0;
    background: #fafafa;
  }

  #navBar {
    background: #eee;
    padding: 8px;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }

  #dateDisplay {
    position: absolute;
    top: 10px;
    right: 20px;
    background: rgba(255, 255, 255, 0.8);
    padding: 6px 12px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 1.2em;
  }

  #mapWrap {
    position: relative;
    display: block;
    max-width: 100%;
    margin: 0 auto;
  }

  #mapImg {
    width: 100%;
    height: auto;
    display: block;
  }

  .thumbPin {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.2s;
  }

  .thumbPin:hover {
    transform: translate(-50%, -50%) scale(1.3);
    z-index: 10;
  }

  #sizeControl {
    position: fixed;
    left: 10px;
    bottom: 10px;
    background: rgba(255,255,255,0.8);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.9em;
  }
</style>
</head>

<body>
　
  <div id="navBar">
    <p>撮影日別 地図上表示</p>
    <button id="prevBtn">←前の日付</button>
    <button id="indexBtn" onclick="location.href='index.html'">indexに戻る</button>
    <button id="nextBtn">→次の日付</button>
  </div>

  <div id="mapWrap">
    <img id="mapImg" src="map.png" alt="map" />
    <div id="dateDisplay"></div>
  </div>

  <div id="sizeControl">
    🔍 サムネイルサイズ:
    <input type="range" id="thumbSize" min="40" max="200" value="80" />
  </div>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2DYWLZQLLW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-2DYWLZQLLW');
</script>

<script>
let positions = {};
let photos = [];
let currentDateIndex = 0;
let dates = [];
let thumbSize = 80;

// --- JSONデータのロード ---
async function loadData() {
  positions = await fetch('positions.json').then(r => r.json());
  photos = await fetch('photos.json').then(r => r.json());
  init();
}

// --- 初期化 ---
function init() {
  dates = [...new Set(photos.map(p => p.file.substring(0, 8)))].sort();
  currentDateIndex = 0;
  renderDate(dates[currentDateIndex]);

  document.getElementById('prevBtn').onclick = () => {
    if (currentDateIndex > 0) renderDate(dates[--currentDateIndex]);
  };
  document.getElementById('nextBtn').onclick = () => {
    if (currentDateIndex < dates.length - 1) renderDate(dates[++currentDateIndex]);
  };

  document.getElementById('thumbSize').oninput = (e) => {
    thumbSize = parseInt(e.target.value);
    positionThumbs();
  };
}

// --- 指定日付の写真を描画 ---
function renderDate(dateStr) {
  console.log("renderDate:", dateStr);
  const mapWrap = document.getElementById('mapWrap');
  const mapImg = document.getElementById('mapImg');
  const dateDisplay = document.getElementById('dateDisplay');

  dateDisplay.textContent = `${dateStr.substring(0,4)}/${dateStr.substring(4,6)}/${dateStr.substring(6,8)}`;

  // 古いthumbを削除
  document.querySelectorAll('.thumbPin').forEach(el => el.remove());

  const dailyPhotos = photos.filter(p => p.file.startsWith(dateStr));

  dailyPhotos.forEach((photo, i) => {
    const match = photo.file.match(/_(\d{2})-/);
    if (!match) return;
    const point = match[1];
    const pos = positions[point];
    if (!pos) return;

    const thumb = document.createElement('img');
    thumb.src = photo.thumb;
    thumb.className = 'thumbPin';
    thumb.dataset.xPct = pos.xPct;
    thumb.dataset.yPct = pos.yPct;
    thumb.dataset.angle = (i / dailyPhotos.length) * Math.PI * 2;
    thumb.dataset.radius = 20;
    thumb.style.width = thumb.style.height = thumbSize + "px";

    // 拡大画像表示
    thumb.onclick = () => {
      const full = document.createElement('img');
      full.src = photo.full;
      full.style.maxWidth = '90vw';
      full.style.maxHeight = '90vh';
      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.8);
        display:flex;align-items:center;justify-content:center;z-index:9999;
      `;
      overlay.appendChild(full);
      overlay.onclick = () => overlay.remove();
      document.body.appendChild(overlay);
    };

    mapWrap.appendChild(thumb);
  });

  // mapImg ロード後に配置実行
  const safePosition = () => {
    console.debug("画像サイズ:", mapImg.clientWidth, mapImg.clientHeight);
    positionThumbs();
  };

  if (mapImg.complete && mapImg.naturalWidth > 0) {
    safePosition();
  } else {
    mapImg.addEventListener('load', safePosition, { once: true });
  }
}

// --- サムネイルを配置 ---
function positionThumbs() {
  const mapImg = document.getElementById('mapImg');
  const imgWidth = mapImg.clientWidth;
  const imgHeight = mapImg.clientHeight;

  console.debug("positionThumbs:", imgWidth, imgHeight);

  document.querySelectorAll('.thumbPin').forEach(pin => {
    pin.style.width = pin.style.height = thumbSize + "px";
    const xPct = parseFloat(pin.dataset.xPct) || 50;
    const yPct = parseFloat(pin.dataset.yPct) || 50;
    const r = parseFloat(pin.dataset.radius) || 0;
    const a = parseFloat(pin.dataset.angle) || 0;

    const x = imgWidth * xPct / 100 + Math.cos(a) * r;
    const y = imgHeight * yPct / 100 + Math.sin(a) * r;

    pin.style.left = `${x}px`;
    pin.style.top = `${y}px`;
  });
}

loadData();
</script>
</body>
</html>
